name: CI
on:
  push:
    branches: [ main ]
  pull_request:
jobs:
  build-test:
    name: Build + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: go build ./...
      - run: go test ./...
